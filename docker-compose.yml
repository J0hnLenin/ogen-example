services:
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: swagger-ui
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /etc/swagger/openapi.yml
    volumes:
      - ./api/players_api/openapi.yml:/etc/swagger/openapi.yml:ro
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server
    ports:
      - "8000:8000"
    environment:
      - configPath=config.yml
    volumes:
      - ./server/config.yml:/app/config.yml:ro  

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client
    environment:
      - configPath=config.yml
    volumes:
      - ./client/config.yml:/app/config.yml:ro  
    depends_on:
      - server